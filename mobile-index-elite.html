<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>بنك الرياضيات</title>

<style>
body{
margin:0;
font-family:tahoma;
background:linear-gradient(160deg,#071a2f,#0b2745);
color:#fff;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}

/* الحاوية */
.container{
width:90%;
max-width:420px;
}

/* الشعار */
.logo{
background:rgba(255,255,255,0.08);
padding:20px;
border-radius:20px;
display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:20px;
}

.logo span{
font-size:22px;
font-weight:bold;
}

/* البطاقة */
.card{
background:linear-gradient(135deg,#0ea5e9,#0b3f6e);
border-radius:25px;
padding:25px;
margin-bottom:20px;
box-shadow:0 10px 25px rgba(0,0,0,0.3);
}

.card-number{
font-size:24px;
letter-spacing:2px;
margin-top:15px;
}

/* العنوان */
.title{
font-size:28px;
font-weight:bold;
margin-bottom:10px;
}

.subtitle{
color:#cfe0ee;
font-size:14px;
margin-bottom:25px;
}

/* الأزرار */
.btn{
width:100%;
padding:18px;
margin-bottom:12px;
border:none;
border-radius:18px;
font-size:18px;
font-weight:bold;
cursor:pointer;
}

.btn-teacher{
background:#0ea5e9;
color:#fff;
}

.btn-student{
background:#1e3a8a;
color:#fff;
}

.btn-super{
background:#caa24d;
color:#000;
}

.btn:hover{
opacity:0.9;
}

</style>
</head>

<body>

<div class="container">

<div class="logo">
<span>بنك الرياضيات</span>
<div>MB</div>
</div>

<div class="card">
<div>Math Bank</div>
<div class="card-number">6012 2026 0001 7788</div>
</div>

<div class="title">بوابة الدخول</div>
<div class="subtitle">اختر نوع الحساب للدخول للنظام</div>

<button class="btn btn-teacher" onclick="location.href='mobile-teacher-login.html'">
دخول المعلمة
</button>

<button class="btn btn-student" onclick="location.href='mobile-student-login.html'">
دخول الطالب
</button>

<button class="btn btn-super" onclick="location.href='mobile-supervision-login.html'">
دخول الإشراف
</button>

</div>

</body>
</html>
