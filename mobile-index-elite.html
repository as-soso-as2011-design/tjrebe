<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>بنك الرياضيات</title>

<style>

body{
margin:0;
font-family:system-ui;
background:#071a2f;
color:#fff;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}

/* الحاوية */
.container{
width:90%;
max-width:420px;
}

/* الهيدر */
.header{
display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:25px;
opacity:0.9;
}

.header span{
font-size:20px;
font-weight:600;
}

/* بطاقة البنك */
.bank-card{
background:linear-gradient(135deg,#0b2745,#0f3e6d);
border-radius:22px;
padding:22px;
margin-bottom:30px;
box-shadow:0 10px 30px rgba(0,0,0,0.4);
}

.bank-title{
font-size:16px;
opacity:0.7;
margin-bottom:8px;
}

.bank-name{
font-size:20px;
font-weight:600;
}

/* العنوان */
.title{
font-size:26px;
font-weight:600;
margin-bottom:8px;
}

.subtitle{
font-size:14px;
opacity:0.6;
margin-bottom:25px;
}

/* الأزرار */
.btn{
width:100%;
padding:18px;
margin-bottom:12px;
border:none;
border-radius:16px;
font-size:16px;
font-weight:600;
cursor:pointer;
background:#0f3e6d;
color:#fff;
transition:0.2s;
}

.btn:hover{
background:#14558f;
}

/* زر مميز بسيط */
.btn.primary{
background:#0ea5e9;
}

</style>

</head>

<body>

<div class="container">

<div class="header">
<span>بنك الرياضيات</span>
<span>MB</span>
</div>

<div class="bank-card">
<div class="bank-title">Math Bank</div>
<div class="bank-name">Bank Riyad Math</div>
</div>

<div class="title">بوابة الدخول</div>
<div class="subtitle">اختر نوع الحساب</div>

<button class="btn primary" onclick="location.href='mobile-teacher-login.html'">
دخول المعلمة
</button>

<button class="btn" onclick="location.href='mobile-student-login.html'">
دخول الطالب
</button>

<button class="btn" onclick="location.href='mobile-supervision-login.html'">
دخول الإشراف
</button>

</div>

</body>
</html>
